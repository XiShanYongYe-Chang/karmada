name: dependency-broadcastjob-configmap-env
description: Test GetDependencies with broadcastJobTemplate using ConfigMap in env
operation: InterpretDependency

desiredInput:
  apiVersion: apps.kruise.io/v1alpha1
  kind: AdvancedCronJob
  metadata:
    name: sample
    namespace: test-acj
  spec:
    schedule: "*/2 * * * *"
    template:
      broadcastJobTemplate:
        spec:
          template:
            spec:
              containers:
                - name: app
                  image: myapp:latest
                  env:
                    - name: DB_HOST
                      valueFrom:
                        configMapKeyRef:
                          name: db-config
                          key: host
                    - name: DB_PORT
                      valueFrom:
                        configMapKeyRef:
                          name: db-config
                          key: port

expectedOutput:
  dependencies:
    - apiVersion: v1
      kind: ConfigMap
      name: db-config
      namespace: test-acj

