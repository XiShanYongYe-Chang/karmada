name: dependency-secret-only
description: Test GetDependencies with only Secret dependencies (no ConfigMaps)
operation: InterpretDependency

desiredInput:
  apiVersion: apps.kruise.io/v1alpha1
  kind: AdvancedCronJob
  metadata:
    name: sample
    namespace: test-acj
  spec:
    schedule: "*/10 * * * *"
    template:
      broadcastJobTemplate:
        spec:
          template:
            spec:
              containers:
                - name: secure-app
                  image: secure:v1
                  env:
                    - name: API_KEY
                      valueFrom:
                        secretKeyRef:
                          name: api-credentials
                          key: key
                    - name: API_SECRET
                      valueFrom:
                        secretKeyRef:
                          name: api-credentials
                          key: secret
              volumes:
                - name: tls
                  secret:
                    secretName: tls-certs

expectedOutput:
  dependencies:
    - apiVersion: v1
      kind: Secret
      name: api-credentials
      namespace: test-acj
    - apiVersion: v1
      kind: Secret
      name: tls-certs
      namespace: test-acj

