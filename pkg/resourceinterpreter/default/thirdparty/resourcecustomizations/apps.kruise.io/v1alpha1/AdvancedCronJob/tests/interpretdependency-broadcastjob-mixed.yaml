name: dependency-broadcastjob-mixed
description: Test GetDependencies with broadcastJobTemplate using multiple ConfigMaps and Secrets
operation: InterpretDependency

desiredInput:
  apiVersion: apps.kruise.io/v1alpha1
  kind: AdvancedCronJob
  metadata:
    name: sample
    namespace: test-acj
  spec:
    schedule: "*/2 * * * *"
    template:
      broadcastJobTemplate:
        spec:
          template:
            spec:
              containers:
                - name: app
                  image: myapp:latest
                  env:
                    - name: DB_HOST
                      valueFrom:
                        configMapKeyRef:
                          name: db-config
                          key: host
                    - name: DB_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: db-secret
                          key: password
              volumes:
                - name: app-config
                  configMap:
                    name: app-config
                - name: tls-certs
                  secret:
                    secretName: tls-secret

expectedOutput:
  dependencies:
    - apiVersion: v1
      kind: ConfigMap
      name: app-config
      namespace: test-acj
    - apiVersion: v1
      kind: ConfigMap
      name: db-config
      namespace: test-acj
    - apiVersion: v1
      kind: Secret
      name: db-secret
      namespace: test-acj
    - apiVersion: v1
      kind: Secret
      name: tls-secret
      namespace: test-acj

