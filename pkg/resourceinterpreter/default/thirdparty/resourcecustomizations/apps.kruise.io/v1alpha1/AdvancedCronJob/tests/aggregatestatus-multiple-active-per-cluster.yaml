name: aggregate-status-multiple-active-per-cluster
description: Test AggregateStatus when clusters have multiple active jobs each
operation: AggregateStatus

desiredInput:
  apiVersion: apps.kruise.io/v1alpha1
  kind: AdvancedCronJob
  metadata:
    name: sample
    namespace: test-acj
  spec:
    schedule: "*/2 * * * *"
    template:
      broadcastJobTemplate:
        spec:
          template:
            spec:
              containers:
                - name: nginx
                  image: nginx:alpine

statusInput:
  - clusterName: member1
    status:
      active:
        - apiVersion: apps.kruise.io/v1alpha1
          kind: BroadcastJob
          name: sample-1681378080
          namespace: test-acj
        - apiVersion: apps.kruise.io/v1alpha1
          kind: BroadcastJob
          name: sample-1681378100
          namespace: test-acj
      type: BroadcastJob
      lastScheduleTime: "2023-04-13T09:30:00Z"
  - clusterName: member2
    status:
      active:
        - apiVersion: apps.kruise.io/v1alpha1
          kind: BroadcastJob
          name: sample-1681378120
          namespace: test-acj
        - apiVersion: apps.kruise.io/v1alpha1
          kind: BroadcastJob
          name: sample-1681378140
          namespace: test-acj
        - apiVersion: apps.kruise.io/v1alpha1
          kind: BroadcastJob
          name: sample-1681378160
          namespace: test-acj
      type: BroadcastJob
      lastScheduleTime: "2023-04-13T09:31:00Z"

expectedOutput:
  aggregatedStatus:
    apiVersion: apps.kruise.io/v1alpha1
    kind: AdvancedCronJob
    metadata:
      name: sample
      namespace: test-acj
    spec:
      schedule: "*/2 * * * *"
      template:
        broadcastJobTemplate:
          spec:
            template:
              spec:
                containers:
                  - name: nginx
                    image: nginx:alpine
    status:
      active:
        - apiVersion: apps.kruise.io/v1alpha1
          kind: BroadcastJob
          name: sample-1681378080
          namespace: test-acj
        - apiVersion: apps.kruise.io/v1alpha1
          kind: BroadcastJob
          name: sample-1681378100
          namespace: test-acj
        - apiVersion: apps.kruise.io/v1alpha1
          kind: BroadcastJob
          name: sample-1681378120
          namespace: test-acj
        - apiVersion: apps.kruise.io/v1alpha1
          kind: BroadcastJob
          name: sample-1681378140
          namespace: test-acj
        - apiVersion: apps.kruise.io/v1alpha1
          kind: BroadcastJob
          name: sample-1681378160
          namespace: test-acj
      type: BroadcastJob
      lastScheduleTime: "2023-04-13T09:31:00Z"

